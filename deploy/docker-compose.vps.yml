name: lushvideo

services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 8000
    ports:
      - "127.0.0.1:${APP_PORT:-8011}:8000"
    volumes:
      - ./data:/data
    networks:
      default:
      shared_proxy:
        aliases:
          - lushvideo-app
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/').getcode() == 200 else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

networks:
  shared_proxy:
    external: true
    name: shared_proxy
